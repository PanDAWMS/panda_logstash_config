input {
  jdbc {
    jdbc_driver_library => "/opt/ojdbc17.jar"
    jdbc_driver_class => "Java::oracle.jdbc.OracleDriver"
    jdbc_connection_string => "CONNECTION_STRING"
    jdbc_user => "USER"
    jdbc_password => "PASSWORD"
    id => "b"
    type => "worker_node_metrics"

    connection_retry_attempts => 3
    connection_retry_attempts_wait_time => 10

    schedule => "0 9 * * *"
    statement => "
SELECT
    wnm.SITE,
    wnm.HOST_NAME,
    wnm.TIMESTAMP AS EVENT_TS,
    TO_CHAR(wnm.TIMESTAMP, 'YYYY-MM-DD HH24:MI:SS.FF6') AS LOG_TS,
    wnm.KEY,
    wnm.STATISTICS,
    wnq.PANDA_QUEUE
FROM ATLAS_PANDA.WORKER_NODE_METRICS wnm,
     ATLAS_PANDA.WORKER_NODE_QUEUE wnq
WHERE wnm.SITE = wnq.SITE
  AND wnm.HOST_NAME = wnq.HOST_NAME

        "
  }
}
filter {
if [type] == "worker_node_metrics" {
  mutate {
    rename => { "log_ts" => "timestamp" }
    add_field => {
      "doc_key" => "%{site}-%{panda_queue}-%{host_name}-%{timestamp}-%{key}-%{statistics}"
    }
  }
  fingerprint {
    source => ["doc_key"]
    target=> "[doc_key_md5]"
    method => "MD5"
  }

 mutate {
    add_field => {
      "[@metadata][_id]" => "%{doc_key_md5}" 
    }
  }


  json {
    source => "statistics"
    target => "metrics"
    remove_field => ["statistics"]
  }
ruby {
  code => '
    key = event.get("key")
    metrics = event.get("metrics")

    if key == "jobs" && metrics
      %w[jobs_failed jobs_finished hc_failed hc_finished hssec_failed hssec_finished].each do |field|
        val = metrics[field]
        event.set(field, val) unless val.nil?
      end

      # jobs efficiency
      failed = metrics["jobs_failed"].to_f
      finished = metrics["jobs_finished"].to_f
      total = failed + finished
      event.set("efficiency", (finished / total).round(4)) if total > 0

      # hc efficiency
      hc_failed = metrics["hc_failed"].to_f
      hc_finished = metrics["hc_finished"].to_f
      hc_total = hc_failed + hc_finished
      event.set("hc_efficiency", (hc_finished / hc_total).round(4)) if hc_total > 0

      # hssec efficiency
      hssec_failed = metrics["hssec_failed"].to_f
      hssec_finished = metrics["hssec_finished"].to_f
      hssec_total = hssec_failed + hssec_finished
      event.set("hssec_efficiency", (hssec_finished / hssec_total).round(4)) if hssec_total > 0

    elsif key == "workers" && metrics
      %w[worker_failed worker_finished worker_cancelled].each do |field|
        val = metrics[field]
        event.set(field, val) unless val.nil?
      end

      # worker efficiency
      failed = metrics["worker_failed"].to_f
      finished = metrics["worker_finished"].to_f
      cancelled = metrics["worker_cancelled"].to_f
      total = failed + finished + cancelled
      event.set("efficiency", (finished / total).round(4)) if total > 0
    end
  '
}


  date {
 timezone => "Etc/UTC"
    match => ["timestamp", "yyyy-MM-dd HH:mm:ss.SSSSSS"]
    target => "@timestamp"
  }
  }
}

output {
if [type] == "worker_node_metrics" {
  opensearch {
   hosts => ""
   cacert => ""
   index => "atlas_panda_worker_node-%{+YYYY.MM}"
   document_id => "%{[@metadata][_id]}"
   user => ""
   password => ""
   ssl => true
   manage_template => false
  }

}
}
